name: Build and Deploy Docs to Cloudflare Pages

on:
  push:
    branches:
      - master
      - csharp-plugin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f -v
          fc-list | grep -i "noto.*cjk" | head

      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. 安装 docfx
      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build Project
        run: dotnet build Another-Mirai-Native.Abstractions/Another-Mirai-Native.Abstractions.csproj

      # 4. 生成文档
      - name: Build Docs
        run: docfx Another-Mirai-Native.Abstractions/docs/docfx.json

      # 5. 部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy Another-Mirai-Native.Abstractions/docs/_site \
            --project-name=amn2-plugin-docs \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}