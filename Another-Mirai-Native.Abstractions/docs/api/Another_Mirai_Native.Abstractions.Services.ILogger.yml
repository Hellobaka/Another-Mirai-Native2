  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions.Services
  summary: 定义在不同严重级别（包括调试、信息、警告、错误和致命）记录消息的契约。
  remarks: >-
    此接口的实现应提供记录日志消息的基础机制。这使得应用程序能够以一致的方式记录诊断和操作信息，
                同时在日志的存储位置和显示方式上提供灵活性。每个方法对应特定的日志级别，使开发人员能够根据需要
                对日志输出进行分类和筛选。
  example: []
  syntax:
    content: public interface ILogger
    content.vb: Public Interface ILogger
