  summary: 为处理群聊管理员成员变更事件的处理器。
  remarks: >-
    派生类应实现 OnAdminChanged 方法来定义响应管理员成员变更的具体操作。
                此方法旨在被重写以提供处理管理员变更的自定义行为。
