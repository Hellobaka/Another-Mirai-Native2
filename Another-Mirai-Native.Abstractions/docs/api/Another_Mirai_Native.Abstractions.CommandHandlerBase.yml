  summary: 在收到群消息时异步执行操作。
  example: []
  syntax:
    content: public virtual Task<EventHandleResult> OnReceiveGroupMessageAsync(GroupMessageContext e, CancellationToken ct)
    parameters:
    - id: e
      type: Another_Mirai_Native.Abstractions.Context.GroupMessageContext
      description: 包含收到群消息事件相关信息的事件参数对象。
    - id: ct
      type: System.Threading.CancellationToken
      description: 可用于发出退出操作取消信号的取消令牌。
    return:
      type: System.Threading.Tasks.Task{Another_Mirai_Native.Abstractions.Enums.EventHandleResult}
      description: 事件的处理结果；<xref href="Another_Mirai_Native.Abstractions.Enums.EventHandleResult.Pass" data-throw-if-not-resolved="false"></xref> 不阻塞事件的继续传递；<xref href="Another_Mirai_Native.Abstractions.Enums.EventHandleResult.Block" data-throw-if-not-resolved="false"></xref> 将会阻塞事件的继续传递；
