  namespace: Another_Mirai_Native.Abstractions
  summary: >-
    基于 <xref href="Another_Mirai_Native.Abstractions.Attributes.CommandAttribute" data-throw-if-not-resolved="false"></xref> 特性的指令处理器抽象基类。

    继承此类后，在方法上标注 <xref href="Another_Mirai_Native.Abstractions.Attributes.CommandAttribute" data-throw-if-not-resolved="false"></xref> 即可自动注册为指令处理器。


    <p>此类已实现 <xref href="Another_Mirai_Native.Abstractions.Handlers.IGroupMessageHandler" data-throw-if-not-resolved="false"></xref> 和 <xref href="Another_Mirai_Native.Abstractions.Handlers.IPrivateMessageHandler" data-throw-if-not-resolved="false"></xref>，

    框架会自动发现并注册，无需额外配置。</p>
  example: []
  syntax:
