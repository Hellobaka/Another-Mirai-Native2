  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions
  summary: >-
    作为插件的抽象基类，为框架内的日志记录、消息收发、好友管理、群组管理和应用程序交互提供核心功能及接口。

    插件开发者应从此类派生以实现自定义插件行为。
  remarks: 派生类必须重写所提供的方法来实现具体的插件逻辑。此类公开了用于访问框架 API 的受保护属性，使插件能够与消息、好友、群组以及应用程序级别的功能进行交互。GetPluginInfo 的基础实现会抛出 NotImplementedException，以强制派生类提供插件元数据。
  example: []
  syntax:
    content: public abstract class PluginBase
    content.vb: Public MustInherit Class PluginBase
