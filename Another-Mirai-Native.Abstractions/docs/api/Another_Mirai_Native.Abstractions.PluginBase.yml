  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions
  summary: 在插件禁用时异步执行必要的清理操作。
  remarks: 可在派生类中重写此方法以实现自定义的退出逻辑。如果取消令牌被触发，应适当处理来中止退出操作。
  example: []
  syntax:
    content: public virtual Task OnDisableAsync(CancellationToken ct)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: 可用于发出退出操作取消信号的取消令牌。
    return:
      type: System.Threading.Tasks.Task
      description: 表示异步退出操作的任务。当退出操作完成时，任务也将完成。
    content.vb: Public Overridable Function OnDisableAsync(ct As CancellationToken) As Task
  overload: Another_Mirai_Native.Abstractions.PluginBase.OnDisableAsync*
