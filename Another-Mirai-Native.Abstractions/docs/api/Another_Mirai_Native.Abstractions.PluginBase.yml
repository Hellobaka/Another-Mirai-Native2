  name: OnEnableAsync(CancellationToken)
  nameWithType: PluginBase.OnEnableAsync(CancellationToken)
  fullName: Another_Mirai_Native.Abstractions.PluginBase.OnEnableAsync(System.Threading.CancellationToken)
  type: Method
  source:
    href: https://github.com/Hellobaka/Another-Mirai-Native2/blob/69e426666eb3f4c996896fdd5a49c2ecb858eec1/Another-Mirai-Native.Abstractions/PluginBase.cs
  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions
  summary: 在插件启用时异步处理逻辑。
  remarks: 在派生类中重写此方法以实现自定义的启用逻辑。默认实现会立即完成。
  example: []
  syntax:
    content: public virtual Task OnEnableAsync(CancellationToken ct)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: 可用于取消启用操作的取消令牌。
    return:
      type: System.Threading.Tasks.Task
      description: 表示异步启用操作的任务。
    content.vb: Public Overridable Function OnEnableAsync(ct As CancellationToken) As Task
  overload: Another_Mirai_Native.Abstractions.PluginBase.OnEnableAsync*
- uid: Another_Mirai_Native.Abstractions.PluginBase.OnDisableAsync(System.Threading.CancellationToken)
