  namespace: Another_Mirai_Native.Abstractions.Services
  summary: 禁言/解除禁言群成员；要求当前账号必须是群主或管理员，且不能对群主或自己进行此操作
  example: []
  syntax:
    content: bool BanMember(long groupId, long qq, long duration)
    parameters:
    - id: groupId
      type: System.Int64
      description: 操作的群号
    - id: qq
      type: System.Int64
      description: 操作的目标群成员
    - id: duration
      type: System.Int64
      description: 禁言时长（秒）；当值为 <code>0</code> 时，表示解除此人的禁言
    return:
      type: System.Boolean
      description: 操作是否成功
