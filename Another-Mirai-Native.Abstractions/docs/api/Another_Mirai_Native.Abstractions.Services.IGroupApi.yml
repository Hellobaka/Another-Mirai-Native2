  namespace: Another_Mirai_Native.Abstractions.Services
  summary: 全群禁言/解除全群禁言；要求当前账号必须是群主或管理员，且不能对群主或自己进行此操作
  example: []
  syntax:
    content: bool BanGroup(long groupId, bool enable)
    parameters:
    - id: groupId
      type: System.Int64
      description: 操作的群号
    - id: enable
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> 表示开启全群禁言；<a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> 表示解除全群禁言
    return:
      type: System.Boolean
      description: 操作是否成功
    content.vb: Function BanGroup(groupId As Long, enable As Boolean) As Boolean
