  source:
    href: https://github.com/Hellobaka/Another-Mirai-Native2/blob/08c7eec1283ff52cebc65682b7e940f24fe22fec/Another-Mirai-Native.Abstractions/Services/IMessageAPI.cs
  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions.Services
  summary: 检索指定来源的聊天记录历史。
  remarks: >-
    确保提供的 groupId 和 qq 对应有效的群组和用户标识符。
                若只是查询私聊记录，请将 groupId 设置为 0，并使用 qq 参数指定用户标识符。
  example: []
  syntax:
    content: List<ChatHistory> GetChatHistories(long groupId, long qq, int count)
    parameters:
    - id: groupId
      type: System.Int64
      description: 从中检索聊天记录的群组唯一标识符。
    - id: qq
      type: System.Int64
      description: 要检索其聊天记录的用户唯一标识符。
    - id: count
      type: System.Int32
      description: 要返回的聊天记录条目的最大数量。必须是正整数。
    return:
      type: System.Collections.Generic.List{Another_Mirai_Native.Abstractions.Models.ChatHistory}
      description: >-
        表示指定群组和用户聊天记录的 <xref href="Another_Mirai_Native.Abstractions.Models.ChatHistory" data-throw-if-not-resolved="false"></xref> 对象列表。
                    如果未找到聊天记录，则列表为空。
    content.vb: Function GetChatHistories(groupId As Long, qq As Long, count As Integer) As List(Of ChatHistory)
  overload: Another_Mirai_Native.Abstractions.Services.IMessageApi.GetChatHistories*
  nameWithType.vb: IMessageApi.GetChatHistories(Long, Long, Integer)
  fullName.vb: Another_Mirai_Native.Abstractions.Services.IMessageApi.GetChatHistories(Long, Long, Integer)
  name.vb: GetChatHistories(Long, Long, Integer)
