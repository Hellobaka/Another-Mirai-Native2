  langs:
  - csharp
  - vb
  name: OnGroupInviteRequestAsync(GroupInviteRequestContext, CancellationToken)
  nameWithType: IGroupInviteRequestHandler.OnGroupInviteRequestAsync(GroupInviteRequestContext, CancellationToken)
  fullName: Another_Mirai_Native.Abstractions.Handlers.IGroupInviteRequestHandler.OnGroupInviteRequestAsync(Another_Mirai_Native.Abstractions.Context.GroupInviteRequestContext, System.Threading.CancellationToken)
  type: Method
  source:
    href: https://github.com/Hellobaka/Another-Mirai-Native2/blob/4d35f42100273c30444c7e20ffbff0107e3bf781/Another-Mirai-Native.Abstractions/Handlers/GroupInviteRequestHandler.cs
  assemblies:
  - Another-Mirai-Native.Abstractions
  namespace: Another_Mirai_Native.Abstractions.Handlers
  summary: 在收到群邀请加入群时触发。可以通过重写此方法来处理添加请求，例如自动接受、拒绝或忽略请求。不重写时默认行为是忽略请求，即不做任何处理。处理请求请调用参数的 <a href="GroupAddRequestContext.SetRequestResult">GroupAddRequestContext.SetRequestResult</a> 方法
  example: []
  syntax:
    content: Task<EventHandleResult> OnGroupInviteRequestAsync(GroupInviteRequestContext e, CancellationToken ct)
    parameters:
    - id: e
      type: Another_Mirai_Native.Abstractions.Context.GroupInviteRequestContext
      description: 包含群添加请求的详细信息。
    - id: ct
      type: System.Threading.CancellationToken
      description: 可用于发出退出操作取消信号的取消令牌。
    return:
      type: System.Threading.Tasks.Task{Another_Mirai_Native.Abstractions.Enums.EventHandleResult}
      description: 事件的处理结果；<xref href="Another_Mirai_Native.Abstractions.Enums.EventHandleResult.Pass" data-throw-if-not-resolved="false"></xref> 不阻塞事件的继续传递；<xref href="Another_Mirai_Native.Abstractions.Enums.EventHandleResult.Block" data-throw-if-not-resolved="false"></xref> 将会阻塞事件的继续传递；
    content.vb: Function OnGroupInviteRequestAsync(e As GroupInviteRequestContext, ct As CancellationToken) As Task(Of EventHandleResult)
  overload: Another_Mirai_Native.Abstractions.Handlers.IGroupInviteRequestHandler.OnGroupInviteRequestAsync*
