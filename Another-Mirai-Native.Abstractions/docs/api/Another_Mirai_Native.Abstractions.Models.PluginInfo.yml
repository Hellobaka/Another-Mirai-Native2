  summary: 表示插件的元数据信息，包括其标识符、名称、版本、描述和作者。
  remarks: 使用此类存储和访问插件元数据，用于插件发现、用户界面显示或插件管理等目的。
  example: []
  syntax:
    content: public PluginInfo(string appId, string name, string version)
    parameters:
    - id: appId
      type: System.String
      description: >-
        插件应用程序的唯一标识符。该值用于将插件与其他插件区分开。通常建议使用 反向域名 + 插件用途 命名约定来确保唯一性。


        <ul><li>示例：</li><li>com.demo.dice</li><li>me.cqp.luohuaming.dice</li></ul>
    - id: name
      type: System.String
      description: >-
        插件的显示名称。

                    <ul><li>聊天插件</li><li>查天气</li></ul>
    - id: version
      type: System.String
      description: 插件的版本号，通常遵循语义化版本控制规范。
